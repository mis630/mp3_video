<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Smart Video & MP3 Downloader</title>
  <link rel="stylesheet" href="styles/popup.css">
</head>
<body>
  <div class="container">
    <h2>Smart Video Downloader</h2>
    
    <input type="text" id="videoUrl" placeholder="Paste video link here...">
    <button id="analyzeBtn">Analyze Link</button>
    
    <div id="statusMessage" class="hidden">Processing...</div>

    <div id="downloadSection" class="hidden">
      <div class="video-info">
        <p id="videoTitle">Video Detected</p>
      </div>
      <button id="downloadMp4" class="btn">Download Video (MP4)</button>
      <button id="downloadMp3" class="btn audio">Convert & Download MP3</button>
    </div>
  </div>

  <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.0/dist/ffmpeg.min.js" crossorigin="anonymous"></script>
  <script src="scripts/popup.js"></script>
</body>
</html>
